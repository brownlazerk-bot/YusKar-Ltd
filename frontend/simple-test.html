<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Test</title>
</head>
<body>
    <h1>Simple JavaScript Test</h1>
    <div id="results"></div>

    <script type="module">
        const results = document.getElementById('results');
        
        // Test 1: Check environment variables
        try {
            const supabaseUrl = import.meta.env.VITE_SUPABASE_URL;
            results.innerHTML += `<p>Environment variables: ${supabaseUrl ? 'WORKING' : 'NOT FOUND'}</p>`;
        } catch (error) {
            results.innerHTML += `<p>Environment variables error: ${error.message}</p>`;
        }

        // Test 2: Check if we can import modules
        try {
            const response = await fetch('../js/supabaseClient.js');
            if (response.ok) {
                results.innerHTML += `<p>supabaseClient.js: FILE EXISTS</p>`;
            } else {
                results.innerHTML += `<p>supabaseClient.js: FILE NOT FOUND (${response.status})</p>`;
            }
        } catch (error) {
            results.innerHTML += `<p>supabaseClient.js error: ${error.message}</p>`;
        }

        // Test 3: Try to import the module
        try {
            import('../js/supabaseClient.js').then(module => {
                results.innerHTML += `<p>supabaseClient.js: IMPORT SUCCESS</p>`;
                console.log('Module loaded:', module);
            }).catch(error => {
                results.innerHTML += `<p>supabaseClient.js: IMPORT FAILED - ${error.message}</p>`;
                console.error('Import error:', error);
            });
        } catch (error) {
            results.innerHTML += `<p>Import attempt error: ${error.message}</p>`;
        }
    </script>
</body>
</html>
